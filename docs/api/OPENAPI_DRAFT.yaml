openapi: 3.1.0
info:
  title: PakimonGO API Draft
  version: 0.1.0-alpha0
  description: Contract-first draft for Alpha-0 planning. This is not generated from code yet.
servers:
  - url: https://api.pakimongo.example/v1
    description: Placeholder production URL
  - url: http://localhost:8000/v1
    description: Local development URL
security:
  - bearerAuth: []
paths:
  /me:
    get:
      summary: Get current account profile
      operationId: getMe
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
  /account-deletion-requests:
    post:
      summary: Request account deletion
      operationId: requestAccountDeletion
      responses:
        "202":
          description: Deletion request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletionRequest"
  /media/uploads:
    post:
      summary: Create signed upload intent
      operationId: createUploadIntent
      x-requirements:
        - FR-CAP-011
        - NFR-SEC-005
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadIntentRequest"
      responses:
        "201":
          description: Signed upload intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadIntent"
  /media/uploads/{mediaAssetId}/complete:
    post:
      summary: Complete an upload idempotently
      operationId: completeUpload
      x-requirements:
        - FR-CAP-012
        - FR-CAP-013
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: mediaAssetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteUploadRequest"
      responses:
        "200":
          description: Upload completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
  /submissions:
    post:
      summary: Submit a capture for scoring
      operationId: createSubmission
      x-requirements:
        - FR-CAP-005
        - FR-SCORE-003
        - FR-SCORE-008
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequest"
      responses:
        "202":
          description: Submission accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
    get:
      summary: List current user's submissions
      operationId: listSubmissions
      parameters:
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Submission page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionPage"
  /submissions/{submissionId}:
    get:
      summary: Get submission detail
      operationId: getSubmission
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Submission detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
  /submissions/{submissionId}/score:
    get:
      summary: Get visible score state
      operationId: getSubmissionScore
      x-requirements:
        - FR-SCORE-003
        - FR-SCORE-004
        - FR-LB-010
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Score state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreState"
  /maps/activity:
    get:
      summary: Get privacy-safe map activity
      operationId: getMapActivity
      x-requirements:
        - FR-MAP-003
        - FR-MAP-004
        - NFR-PRIV-001
      parameters:
        - name: bbox
          in: query
          required: true
          description: west,south,east,north viewport bounds
          schema:
            type: string
        - name: zoom
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Privacy-safe activity cells
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapActivity"
  /maps/waypoints:
    post:
      summary: Set a waypoint to a general area
      operationId: setWaypoint
      x-requirements:
        - FR-MAP-008
        - FR-MAP-009
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWaypointRequest"
      responses:
        "200":
          description: Waypoint route summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Waypoint"
  /leaderboards/{scope}:
    get:
      summary: Get leaderboard by scope
      operationId: getLeaderboard
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
            enum: [global, country, local, friends]
        - name: period
          in: query
          schema:
            type: string
            enum: [all_time, weekly, monthly]
      responses:
        "200":
          description: Leaderboard page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardPage"
  /reports:
    post:
      summary: Report content, user, group, comment, or score
      operationId: reportContent
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "202":
          description: Report accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationCase"
  /blocks:
    post:
      summary: Block a user
      operationId: blockUser
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: string
      responses:
        "201":
          description: Block created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
  /appeals:
    post:
      summary: Create score, duplicate, zoo, identification, or moderation appeal
      operationId: createAppeal
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppealRequest"
      responses:
        "202":
          description: Appeal accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appeal"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
  schemas:
    UserProfile:
      type: object
      required: [userId, displayName, ageBand, privacyDefaults]
      properties:
        userId:
          type: string
        displayName:
          type: string
        ageBand:
          type: string
          enum: [adult, teen]
        privacyDefaults:
          type: object
    DeletionRequest:
      type: object
      required: [requestId, status, requestedAt]
      properties:
        requestId:
          type: string
        status:
          type: string
          enum: [requested, processing, completed, rejected]
        requestedAt:
          type: string
          format: date-time
    CreateUploadIntentRequest:
      type: object
      required: [fileName, contentType, byteSize, sha256]
      properties:
        fileName:
          type: string
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
        byteSize:
          type: integer
        sha256:
          type: string
    UploadIntent:
      type: object
      required: [mediaAssetId, uploadUrl, expiresAt]
      properties:
        mediaAssetId:
          type: string
        uploadUrl:
          type: string
          description: Short-lived private upload URL; never stored in logs.
        expiresAt:
          type: string
          format: date-time
    CompleteUploadRequest:
      type: object
      required: [sha256]
      properties:
        sha256:
          type: string
    MediaAsset:
      type: object
      required: [mediaAssetId, processingState, originalPrivate]
      properties:
        mediaAssetId:
          type: string
        processingState:
          type: string
          enum: [pending_upload, uploaded, processing, ready, rejected]
        originalPrivate:
          type: boolean
    CreateSubmissionRequest:
      type: object
      required: [mediaAssetId, animalContext, visibility]
      properties:
        mediaAssetId:
          type: string
        animalContext:
          type: string
          enum: [wild, pet, zoo_captive, unknown]
        realName:
          type: string
        cuteName:
          type: string
        caption:
          type: string
        tags:
          type: array
          items:
            type: string
        visibility:
          type: string
          enum: [private, friends, selected_friends, public]
        foregroundLocation:
          $ref: "#/components/schemas/PrivateLocationInput"
    PrivateLocationInput:
      type: object
      description: Accepted only on protected submission APIs; never returned by public APIs.
      required: [latitude, longitude, accuracyMeters]
      properties:
        latitude:
          type: number
        longitude:
          type: number
        accuracyMeters:
          type: number
    Submission:
      type: object
      required: [submissionId, mediaAssetId, scoreState, visibility]
      properties:
        submissionId:
          type: string
        mediaAssetId:
          type: string
        scoreState:
          $ref: "#/components/schemas/ScoreState"
        visibility:
          type: string
        publicLocation:
          $ref: "#/components/schemas/PublicLocationCell"
    SubmissionPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Submission"
        nextCursor:
          type: string
    ScoreState:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, prechecked, ai_evaluated, scored, capped, review, rejected]
        visiblePoints:
          type: integer
          nullable: true
        explanationSummary:
          type: string
        ledger:
          type: string
          enum: [wild, pet_social, participation]
    PublicLocationCell:
      type: object
      required: [cellId, precisionLabel]
      properties:
        cellId:
          type: string
        precisionLabel:
          type: string
          enum: [coarse, delayed, suppressed]
    MapActivity:
      type: object
      required: [cells]
      properties:
        cells:
          type: array
          items:
            type: object
            required: [cellId, speciesSummary, activityCount]
            properties:
              cellId:
                type: string
              speciesSummary:
                type: array
                items:
                  type: string
              activityCount:
                type: integer
              suppressedReason:
                type: string
    CreateWaypointRequest:
      type: object
      required: [targetCellId]
      properties:
        targetCellId:
          type: string
    Waypoint:
      type: object
      required: [waypointId, targetCellId, routeSummary]
      properties:
        waypointId:
          type: string
        targetCellId:
          type: string
        routeSummary:
          type: string
    LeaderboardPage:
      type: object
      required: [scope, entries]
      properties:
        scope:
          type: string
        entries:
          type: array
          items:
            type: object
            required: [rank, userId, displayName, score]
            properties:
              rank:
                type: integer
              userId:
                type: string
              displayName:
                type: string
              score:
                type: integer
    CreateReportRequest:
      type: object
      required: [targetType, targetId, category]
      properties:
        targetType:
          type: string
          enum: [post, comment, profile, group, user, submission, score]
        targetId:
          type: string
        category:
          type: string
        notes:
          type: string
    ModerationCase:
      type: object
      required: [caseId, status]
      properties:
        caseId:
          type: string
        status:
          type: string
          enum: [open, under_review, actioned, closed]
    Block:
      type: object
      required: [blockId, targetUserId]
      properties:
        blockId:
          type: string
        targetUserId:
          type: string
    CreateAppealRequest:
      type: object
      required: [targetType, targetId, reason]
      properties:
        targetType:
          type: string
          enum: [score, duplicate, zoo_eligibility, identification, moderation]
        targetId:
          type: string
        reason:
          type: string
    Appeal:
      type: object
      required: [appealId, status]
      properties:
        appealId:
          type: string
        status:
          type: string
          enum: [open, under_review, upheld, reversed, modified, rejected]
    ErrorEnvelope:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: string
          enum:
            - UNAUTHENTICATED
            - APP_CHECK_REQUIRED
            - FORBIDDEN
            - NOT_FOUND
            - VALIDATION_FAILED
            - IDEMPOTENCY_CONFLICT
            - UPLOAD_EXPIRED
            - RATE_LIMITED
            - QUARANTINED
            - PROVIDER_UNAVAILABLE
            - TIMEOUT
            - CONFLICT
            - INTERNAL
        message:
          type: string
        requestId:
          type: string
