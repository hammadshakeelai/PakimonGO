openapi: 3.1.0
info:
  title: PakimonGO API Draft
  version: 0.2.0-alpha0
  description: >
    OpenAPI draft reflecting Sprint 1-20 implemented endpoints.
    Endpoints marked `x-status: planned` are future features not yet implemented.
    This is a living document — update when new endpoints are added.
servers:
  - url: https://api.pakimongo.example/v1
    description: Placeholder production URL
  - url: http://localhost:8000/v1
    description: Local development URL
security:
  - bearerAuth: []
paths:
  /health/live:
    get:
      summary: Liveness check
      operationId: healthLive
      x-status: implemented
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /health/ready:
    get:
      summary: Readiness check
      operationId: healthReady
      x-status: implemented
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /media/upload-intent:
    post:
      summary: Create upload intent
      operationId: createUploadIntent
      x-status: implemented
      x-requirements:
        - FR-CAP-011
        - NFR-SEC-005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadIntentRequest"
      responses:
        "200":
          description: Upload intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadIntent"
        "400":
          description: Missing or invalid fields
          $ref: "#/components/responses/ValidationError"
  /media/upload/{mediaAssetId}:
    put:
      summary: Upload file bytes
      operationId: uploadFile
      x-status: implemented
      parameters:
        - name: mediaAssetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  mediaAssetId:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /media/complete-upload:
    post:
      summary: Complete upload and generate derivatives
      operationId: completeUpload
      x-status: implemented
      x-requirements:
        - FR-CAP-012
        - FR-CAP-013
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteUploadRequest"
      responses:
        "200":
          description: Upload completed with derivative URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteUploadResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/derivatives/{mediaAssetId}:
    get:
      summary: Get media derivative URLs
      operationId: getDerivatives
      x-status: implemented
      parameters:
        - name: mediaAssetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Derivative URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DerivativeSet"
        "404":
          $ref: "#/components/responses/NotFound"
  /media/files/{subdir}/{filename}:
    get:
      summary: Serve stored file
      operationId: serveFile
      x-status: implemented
      security: []
      parameters:
        - name: subdir
          in: path
          required: true
          schema:
            type: string
            enum: [originals, thumbs, public]
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File stream
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  /submissions:
    post:
      summary: Submit a capture for scoring
      operationId: createSubmission
      x-status: implemented
      x-requirements:
        - FR-CAP-005
        - FR-SCORE-003
        - FR-SCORE-008
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequest"
      responses:
        "200":
          description: Submission created with precheck result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/ValidationError"
    get:
      summary: List user submissions
      operationId: listSubmissions
      x-status: implemented
      x-requirements:
        - FR-CAP-005
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, prechecked, ai_evaluated, scored, capped, review, rejected, rolled_back]
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [createdAt, submittedAt, status, points, species]
            default: createdAt
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: include_sensitive
          in: query
          schema:
            type: boolean
            default: false
          description: Include sensitive species (requires elevated permissions)
      responses:
        "200":
          description: Paginated list of submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSubmissionListResponse"

  /submissions/{submissionId}:
    get:
      summary: Get submission detail
      operationId: getSubmission
      x-status: implemented
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Submission detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/me:
    get:
      summary: Get current user profile
      operationId: getMyProfile
      x-status: implemented
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      summary: Update current user profile
      operationId: patchMyProfile
      x-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserProfileRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          $ref: "#/components/responses/NotFound"
  /users/me/collection:
    get:
      summary: Get current user species collection
      operationId: getMyCollection
      x-status: implemented
      x-requirements:
        - FR-LB-005
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: context
          in: query
          schema:
            type: string
            enum: [wild, zoo, pet, unknown]
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [totalPoints, species, captureCount, lastCaptured]
            default: totalPoints
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: include_sensitive
          in: query
          schema:
            type: boolean
            default: false
          description: Include sensitive species (requires elevated permissions)
      responses:
        "200":
          description: User collection of scored species
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCollectionResponse"

  /leaderboard:
    get:
      summary: Get global leaderboard
      operationId: getLeaderboardSimple
      x-status: implemented
      x-requirements:
        - FR-LB-001
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [totalScore, userId, submissionCount]
            default: totalScore
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: include_sensitive
          in: query
          schema:
            type: boolean
            default: false
          description: Include sensitive species (requires elevated permissions)
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedLeaderboardResponse"

  /account-deletion-requests:
    post:
      summary: Request account deletion
      operationId: requestAccountDeletion
      x-status: planned
      responses:
        "202":
          description: Deletion request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletionRequest"
  /submissions/{submissionId}/score:
    get:
      summary: Get visible score state
      operationId: getSubmissionScore
      x-status: planned
      x-requirements:
        - FR-SCORE-003
        - FR-SCORE-004
        - FR-LB-010
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Score state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreState"
  /maps/activity:
    get:
      summary: Get privacy-safe map activity
      operationId: getMapActivity
      x-status: planned
      x-requirements:
        - FR-MAP-003
        - FR-MAP-004
        - NFR-PRIV-001
      parameters:
        - name: bbox
          in: query
          required: true
          description: west,south,east,north viewport bounds
          schema:
            type: string
        - name: zoom
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Privacy-safe activity cells
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapActivity"
  /maps/waypoints:
    post:
      summary: Set a waypoint to a general area
      operationId: setWaypoint
      x-status: planned
      x-requirements:
        - FR-MAP-008
        - FR-MAP-009
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWaypointRequest"
      responses:
        "200":
          description: Waypoint route summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Waypoint"
  /leaderboards/{scope}:
    get:
      summary: Get leaderboard by scope
      operationId: getLeaderboard
      x-status: planned
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
            enum: [global, country, local, friends]
        - name: period
          in: query
          schema:
            type: string
            enum: [all_time, weekly, monthly]
      responses:
        "200":
          description: Leaderboard page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardPage"
  /reports:
    post:
      summary: Report content, user, group, comment, or score
      operationId: reportContent
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "202":
          description: Report accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationCase"
  /blocks:
    post:
      summary: Block a user
      operationId: blockUser
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: string
      responses:
        "201":
          description: Block created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
  /appeals:
    post:
      summary: Create score, duplicate, zoo, identification, or moderation appeal
      operationId: createAppeal
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppealRequest"
      responses:
        "202":
          description: Appeal accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appeal"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            code: NOT_FOUND
            message: "Resource not found"
            requestId: "req_abc123"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            code: VALIDATION_FAILED
            message: "Missing required fields"
            requestId: "req_abc123"

  schemas:
    # ── Media ────────────────────────────────────────────
    CreateUploadIntentRequest:
      type: object
      required: [fileName, contentType, byteSize, sha256]
      properties:
        fileName:
          type: string
          example: sparrow.jpg
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
        byteSize:
          type: integer
          maximum: 10485760
          description: Max 10 MB
          example: 500000
        sha256:
          type: string
          description: SHA-256 hex digest of the file content
          example: "aabbccddee..."  # truncated for display
    UploadIntent:
      type: object
      required: [mediaAssetId, uploadUrl, expiresAt]
      properties:
        mediaAssetId:
          type: string
          example: asset_001
        uploadUrl:
          type: string
          description: Local URL for PUT upload
          example: /v1/media/upload/asset_001
        expiresAt:
          type: string
          format: date-time
    CompleteUploadRequest:
      type: object
      required: [mediaAssetId, sha256]
      properties:
        mediaAssetId:
          type: string
        sha256:
          type: string
    CompleteUploadResponse:
      type: object
      required: [status, mediaAssetId, derivatives]
      properties:
        status:
          type: string
          example: ok
        mediaAssetId:
          type: string
        derivatives:
          $ref: "#/components/schemas/DerivativeSet"
    DerivativeSet:
      type: object
      required: [thumbnailUrl, derivativeUrl, exifStripped]
      properties:
        thumbnailUrl:
          type: string
          nullable: true
          example: /v1/media/files/thumbs/asset_001.webp
        derivativeUrl:
          type: string
          nullable: true
          example: /v1/media/files/public/asset_001.webp
        exifStripped:
          type: boolean
          example: true

    # ── Submission ────────────────────────────────────────
    CreateSubmissionRequest:
      type: object
      required: [mediaAssetId, animalContext]
      properties:
        mediaAssetId:
          type: string
        animalContext:
          type: string
          enum: [wild, zoo, pet, unknown]
        realName:
          type: string
        cuteName:
          type: string
        caption:
          type: string
        tags:
          type: array
          items:
            type: string
        foregroundLocation:
          $ref: "#/components/schemas/PrivateLocationInput"
    PrivateLocationInput:
      type: object
      description: Accepted only on protected submission APIs; never returned by public APIs.
      properties:
        latitude:
          type: number
        longitude:
          type: number
        accuracyMeters:
          type: number
    Submission:
      type: object
      required: [submissionId, mediaAssetId, scoreState, visibility]
      properties:
        submissionId:
          type: string
          example: sub_001
        mediaAssetId:
          type: string
        scoreState:
          $ref: "#/components/schemas/ScoreState"
        visibility:
          type: string
          enum: [private]
          description: Currently always private; friends/public planned
        publicLocation:
          $ref: "#/components/schemas/PublicLocationCell"
    ScoreState:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, prechecked, ai_evaluated, scored, capped, review, rejected, rolled_back]
        visiblePoints:
          type: integer
          nullable: true
        explanationSummary:
          type: string
          enum: [normal, duplicate_cap, zoo_cap, pet_cap, review_required, unsafe_rejected, low_confidence]
        ledger:
          type: string
          nullable: true
    PublicLocationCell:
      type: object
      required: [cellId, precisionLabel]
      properties:
        cellId:
          type: string
          example: cell_a1b2c3d4
        precisionLabel:
          type: string
          enum: [coarse]

    # ── User ──────────────────────────────────────────────
    UserProfile:
      type: object
      required: [userId, email, status]
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, suspended, deleted]
        ageBand:
          type: string
          nullable: true
          enum: [adult, teen]
        homeRegion:
          type: string
          nullable: true
        trustState:
          type: string
          nullable: true
          enum: [trusted, normal, low, restricted]
        createdAt:
          type: string
          format: date-time
          nullable: true
    CollectionResponse:
      type: object
      required: [userId, species]
      properties:
        userId:
          type: string
        species:
          type: array
          items:
            $ref: "#/components/schemas/CollectionEntry"
    CollectionEntry:
      type: object
      required: [species, context, totalPoints, captureCount]
      properties:
        species:
          type: string
          example: Aquila chrysaetos
        context:
          type: string
          enum: [wild, zoo, pet, unknown]
        totalPoints:
          type: integer
        captureCount:
          type: integer
        lastCaptured:
          type: string
          format: date-time
          nullable: true
    LeaderboardResponse:
      type: object
      required: [entries, totalReturned]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        totalReturned:
          type: integer
    LeaderboardEntry:
      type: object
      required: [userId, totalScore, submissionCount]
      properties:
        userId:
          type: string
        ageBand:
          type: string
          nullable: true
        homeRegion:
          type: string
          nullable: true
        totalScore:
          type: integer
        submissionCount:
          type: integer
    PatchUserProfileRequest:
      type: object
      properties:
        ageBand:
          type: string
          enum: [adult, teen]
        homeRegion:
          type: string

    # ── Pagination ────────────────────────────────────────────
    Pagination:
      type: object
      required: [limit, offset, total]
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

    PaginatedCollectionResponse:
      type: object
      required: [userId, species, pagination]
      properties:
        userId:
          type: string
        species:
          type: array
          items:
            $ref: "#/components/schemas/CollectionEntry"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedLeaderboardResponse:
      type: object
      required: [entries, pagination]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedSubmissionListResponse:
      type: object
      required: [submissions, pagination]
      properties:
        submissions:
          type: array
          items:
            $ref: "#/components/schemas/Submission"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ── Future / Planned ──────────────────────────────────
    DeletionRequest:
      type: object
      required: [requestId, status, requestedAt]
      properties:
        requestId:
          type: string
        status:
          type: string
          enum: [requested, processing, completed, rejected]
        requestedAt:
          type: string
          format: date-time
    MapActivity:
      type: object
      required: [cells]
      properties:
        cells:
          type: array
          items:
            type: object
            required: [cellId, speciesSummary, activityCount]
            properties:
              cellId:
                type: string
              speciesSummary:
                type: array
                items:
                  type: string
              activityCount:
                type: integer
              suppressedReason:
                type: string
    CreateWaypointRequest:
      type: object
      required: [targetCellId]
      properties:
        targetCellId:
          type: string
    Waypoint:
      type: object
      required: [waypointId, targetCellId, routeSummary]
      properties:
        waypointId:
          type: string
        targetCellId:
          type: string
        routeSummary:
          type: string
    LeaderboardPage:
      type: object
      required: [scope, entries]
      properties:
        scope:
          type: string
        entries:
          type: array
          items:
            type: object
            required: [rank, userId, displayName, score]
            properties:
              rank:
                type: integer
              userId:
                type: string
              displayName:
                type: string
              score:
                type: integer
    CreateReportRequest:
      type: object
      required: [targetType, targetId, category]
      properties:
        targetType:
          type: string
          enum: [post, comment, profile, group, user, submission, score]
        targetId:
          type: string
        category:
          type: string
        notes:
          type: string
    ModerationCase:
      type: object
      required: [caseId, status]
      properties:
        caseId:
          type: string
        status:
          type: string
          enum: [open, under_review, actioned, closed]
    Block:
      type: object
      required: [blockId, targetUserId]
      properties:
        blockId:
          type: string
        targetUserId:
          type: string
    CreateAppealRequest:
      type: object
      required: [targetType, targetId, reason]
      properties:
        targetType:
          type: string
          enum: [score, duplicate, zoo_eligibility, identification, moderation]
        targetId:
          type: string
        reason:
          type: string
    Appeal:
      type: object
      required: [appealId, status]
      properties:
        appealId:
          type: string
        status:
          type: string
          enum: [open, under_review, upheld, reversed, modified, rejected]
    ErrorEnvelope:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: string
          enum:
            - UNAUTHENTICATED
            - APP_CHECK_REQUIRED
            - FORBIDDEN
            - NOT_FOUND
            - VALIDATION_FAILED
            - IDEMPOTENCY_CONFLICT
            - UPLOAD_EXPIRED
            - RATE_LIMITED
            - QUARANTINED
            - PROVIDER_UNAVAILABLE
            - TIMEOUT
            - CONFLICT
            - INTERNAL
        message:
          type: string
        requestId:
          type: string
