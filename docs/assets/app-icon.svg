<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PakimonGO app icon">
  <defs>
    <linearGradient id="iconbg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f9d6b"/>
      <stop offset="0.55" stop-color="#12674a"/>
      <stop offset="1" stop-color="#0b3d2e"/>
    </linearGradient>
    <radialGradient id="iconglow" cx="0.32" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#7dffc4" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7dffc4" stop-opacity="0"/>
    </radialGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#052018" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect width="512" height="512" rx="112" fill="url(#iconbg)"/>
  <rect width="512" height="512" rx="112" fill="url(#iconglow)"/>

  <!-- camera aperture ring -->
  <circle cx="256" cy="256" r="182" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="10"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#7dffc4" stroke-opacity="0.28" stroke-width="4" stroke-dasharray="10 16"/>

  <!-- paw print -->
  <g fill="#ffffff" filter="url(#drop)">
    <ellipse cx="256" cy="300" rx="86" ry="66"/>
    <ellipse cx="176" cy="214" rx="30" ry="38" transform="rotate(-14 176 214)"/>
    <ellipse cx="224" cy="176" rx="30" ry="40"/>
    <ellipse cx="288" cy="176" rx="30" ry="40"/>
    <ellipse cx="336" cy="214" rx="30" ry="38" transform="rotate(14 336 214)"/>
  </g>

  <!-- shutter accent dot -->
  <circle cx="256" cy="300" r="16" fill="#12674a" opacity="0.18"/>
</svg>
