services:
  - type: web
    name: pakimongo-api
    runtime: python
    repo: https://github.com/hammadshakeelai/PakimonGO
    plan: free
    region: oregon
    buildCommand: pip install -r services/api/requirements.txt gunicorn
    # Free tier does not support preDeployCommand, so run migrations at boot.
    startCommand: cd services/api && alembic upgrade head && gunicorn src.main:app -c gunicorn.conf.py
    healthCheckPath: /health/live
    envVars:
      # Postgres connection string, injected from the managed database below.
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: pakimongo-db
          property: connectionString
      # Import root so `src.main:app` and the scoring-rules package resolve.
      - key: PYTHONPATH
        value: /opt/render/project/src/services/api
      - key: STORAGE_PROVIDER
        value: local
      - key: UPLOAD_BASE
        value: /tmp/uploads
      # Auth: "fake" works out of the box. Switch to "firebase" and upload the
      # service-account JSON (set GOOGLE_APPLICATION_CREDENTIALS) for real login.
      - key: AUTH_PROVIDER
        value: fake
      # Vision: "dummy" scores without a key. Switch to "groq" and set
      # GROQ_API_KEY below for real AI scoring (free tier, no billing).
      - key: VISION_PROVIDER
        value: dummy
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: pakimongo-db
    plan: free
    region: oregon
    databaseName: pakimongo
    user: pakimongo
