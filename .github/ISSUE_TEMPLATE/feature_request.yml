name: Feature Request
description: Propose a product or engineering feature.
title: "[Feature]: "
labels: ["feature", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be built?
    validations:
      required: true
  - type: input
    id: requirements
    attributes:
      label: Related Requirements / ADRs
      description: Example FR-CAP-003, ADR-004.
    validations:
      required: false
  - type: textarea
    id: tests
    attributes:
      label: Acceptance Tests
      description: Which test IDs or scenarios should prove this works?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy/Security Notes
      description: Include location, media, auth, UGC, scoring, or moderation impact.
    validations:
      required: false
  - type: textarea
    id: rollout
    attributes:
      label: Rollout / Feature Flag Plan
    validations:
      required: false
