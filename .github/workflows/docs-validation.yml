name: Docs and Scaffold Validation

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install validation dependencies
        run: python -m pip install PyYAML
      - name: Validate planning docs
        run: python tools/qa/validate_docs.py
      - name: Validate JSON examples
        run: python tools/qa/validate_json_examples.py
      - name: Scan for obvious secrets
        run: python tools/qa/scan_secrets.py

  ruff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Run ruff check
        working-directory: services/api
        run: python -m ruff check src/ tests/

  mypy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: services/api
        run: python -m pip install -r requirements.txt mypy
      - name: Run mypy
        working-directory: services/api
        run: python -m mypy src/main.py

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: services/api
        run: python -m pip install -r requirements.txt
      - name: Run API tests
        working-directory: services/api
        run: python -m pytest -v

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: services/workers
        run: python -m pip install -r requirements.txt
      - name: Run worker tests
        working-directory: services/workers
        run: python -m pytest -v

  scoring-rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run scoring-rules tests
        working-directory: packages/scoring-rules
        run: python -m pytest -v

  goldset-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PyYAML
        run: python -m pip install PyYAML
      - name: Run goldset smoke tests
        working-directory: packages/scoring-rules
        run: python -m pytest tests/test_goldset_runner.py -v

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: services/api
        run: python -m pip install -r requirements.txt
      - name: Run integration tests
        working-directory: services/api
        run: python -m pytest tests/test_integration.py -v

  flutter-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          channel: "stable"
      - name: Run Flutter tests
        working-directory: apps/mobile/pakimon_go_app
        run: flutter test
