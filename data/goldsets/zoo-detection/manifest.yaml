dataset_id: goldset-zoo-detection-v0.1.0
dataset_type: zoo-detection
version: 0.1.0
license: synthetic
owner: dev-team
description: >
  Scenarios for zoo/captive/pet context classification in the precheck pipeline.
  Tests that zoo-aware cap logic correctly identifies zoo, pet, and wild contexts.
items:
  - item_id: zoo-001
    description: zoo context flagged as zoo
    input:
      animal_context: zoo
      existing_sha256s: []
      current_sha256: "sha_zoo_001"
    expected:
      duplicate_found: false
      explanation_category: zoo_cap
      suggested_state: capped
      context: zoo

  - item_id: zoo-002
    description: pet context flagged as pet
    input:
      animal_context: pet
      existing_sha256s: []
      current_sha256: "sha_pet_001"
    expected:
      duplicate_found: false
      explanation_category: pet_cap
      suggested_state: capped
      context: pet

  - item_id: zoo-003
    description: wild context passes to AI evaluation
    input:
      animal_context: wild
      existing_sha256s: []
      current_sha256: "sha_wild_001"
    expected:
      duplicate_found: false
      explanation_category: normal
      suggested_state: ai_evaluated
      context: wild

  - item_id: zoo-004
    description: unknown context defaults to AI evaluation
    input:
      animal_context: unknown
      existing_sha256s: []
      current_sha256: "sha_unknown_001"
    expected:
      duplicate_found: false
      explanation_category: normal
      suggested_state: ai_evaluated
      context: unknown

  - item_id: zoo-005
    description: empty context defaults to AI evaluation
    input:
      animal_context: ""
      existing_sha256s: []
      current_sha256: "sha_empty_001"
    expected:
      duplicate_found: false
      explanation_category: normal
      suggested_state: ai_evaluated
      context: unknown

  - item_id: zoo-006
    description: null context defaults to AI evaluation
    input:
      animal_context: null
      existing_sha256s: []
      current_sha256: "sha_null_001"
    expected:
      duplicate_found: false
      explanation_category: normal
      suggested_state: ai_evaluated
      context: unknown

  - item_id: zoo-007
    description: mixed case zoo is detected
    input:
      animal_context: "ZOO"
      existing_sha256s: []
      current_sha256: "sha_case_001"
    expected:
      duplicate_found: false
      explanation_category: zoo_cap
      suggested_state: capped
      context: zoo

  - item_id: zoo-008
    description: duplicate overrides zoo context
    input:
      animal_context: zoo
      existing_sha256s: ["sha_dup"]
      current_sha256: "sha_dup"
    expected:
      duplicate_found: true
      explanation_category: duplicate_cap
      suggested_state: capped
      context: duplicate

  - item_id: zoo-009
    description: zoo submission with existing unrelated SHA256
    input:
      animal_context: zoo
      existing_sha256s: ["sha_existing_001"]
      current_sha256: "sha_new_002"
    expected:
      duplicate_found: false
      explanation_category: zoo_cap
      suggested_state: capped
      context: zoo
